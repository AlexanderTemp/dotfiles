Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = ""
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = ""
Amazon = ""
Android = ""
Arch = "َ°£‡"
Artix = "َ°£‡"
EndeavourOS = ""
CentOS = ""
# Debian = "َ°£ڑ"
Debian = "ًں¤ "
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"
Pop = ""

[username]
show_always = false
style_user = "bold fg:color_username"
