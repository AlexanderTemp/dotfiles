# Kanagawa Theme for Starship
# Inspired by the beautiful Kanagawa theme for Neovim
# https://github.com/rebelot/kanagawa.nvim

"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true
command_timeout = 2000

format = """
$os\
$username\
$directory\
$git_branch\
$git_commit\
$git_status\
$git_metrics\
$git_state\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$package\
$docker_context\
$kubernetes\
$shell\
$container\
$jobs\
${custom.memory_usage}\
${custom.battery}\
${custom.keyboard_layout}\
$time\
$cmd_duration\
$status\
$line_break\
$character\
"""

palette = 'kanagawa'

[palettes.kanagawa]
color_ok = '#98BB6C'              # springGreen - success states
color_danger = '#E82424'          # samuraiRed - errors
color_caution = '#FF9E3B'         # roninYellow - warnings
color_os = '#7E9CD8'              # crystalBlue - OS identifier
color_username = '#7FB4CA'        # lightBlue - username
color_directory = '#FFA066'       # surimiOrange - directory path
color_git = '#7AA89F'             # waveAqua2 - git info
color_git_added = '#98BB6C'       # springGreen - additions
color_git_deleted = '#E82424'     # samuraiRed - deletions
color_env = '#938AA9'             # oniViolet - programming environments
color_kubernetes = '#957FB8'      # oniViolet2 - kubernetes
color_docker = '#6A9589'          # waveAqua1 - docker
color_shell = '#727169'           # oldWhite - shell indicator
color_container = '#C34043'       # peachRed - containers
color_other = '#54546D'           # sumiInk4 - misc info
color_time = '#C8C093'            # oldWhite - time
color_duration = '#C8C093'        # oldWhite - duration
color_vimcmd_ok = '#7AA89F'       # waveAqua2 - vim normal
color_vimcmd_replace = '#D27E99'  # sakuraPink - vim replace
color_vimcmd_visual = '#FFA066'   # surimiOrange - vim visual

