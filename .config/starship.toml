[git_branch]
symbol = ""
style = "bold fg:color_git"
format = '[(on $symbol $branch )]($style)'
only_attached = true
ignore_branches = []
truncation_length = 30
truncation_symbol = "â€¦"
always_show_remote = false
disabled = false

[git_commit]
style = "bold fg:color_git"
format = "[(َ°“¼ $tag)(@$hash )]($style)"
commit_hash_length = 7
only_detached = true
tag_symbol = "َ°“¼ "
tag_disabled = false
disabled = false

[git_status]
style = "fg:color_git"
format = '[(\[$ahead_behind$all_status\] )]($style)'
stashed = "َ°œ¦${count}"
ahead = "â‡،${count}"
behind = "â‡£${count}"
up_to_date = ""
diverged = "â‡،${ahead_count}â‡£${behind_count}"
conflicted = "=${count}"
deleted = "َ°§§${count}"
renamed = "َ°پ•${count}"
modified = "!${count}"
staged = "َ°گ•${count}"
untracked = "?${count}"
ignore_submodules = false
disabled = false

[git_metrics]
format = '[(+$added)(-$deleted )]($added_style)'
added_style = "bold fg:color_git_added"
deleted_style = "bold fg:color_git_deleted"
only_nonzero_diffs = true
disabled = false

[git_state]
style = "bold fg:color_danger"
format = '[\($state( $progress_current/$progress_total)\) ]($style)'
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
disabled = false

[nodejs]
