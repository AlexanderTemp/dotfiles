number_threshold = 1

[custom.memory_usage]
command = "starship module memory_usage"
when = '[ "${STARSHIP_COCKPIT_MEMORY_USAGE_ENABLED:-false}" = "true" ]'
format = "($output)"
disabled = false

[memory_usage]
threshold = 0
symbol = "َ°“…"
style = "fg:color_other"
format = '([$symbol ${ram} ]($style))'
disabled = false

[custom.battery]
command = """
battery_info=$(starship module battery)
if [ -n "$battery_info" ]; then
    percent=$(echo "$battery_info" | grep -o '[0-9]*%%' | sed 's/%%//')
    if [ "$percent" -le "${STARSHIP_COCKPIT_BATTERY_THRESHOLD:-0}" ]; then
        echo "$battery_info" | sed 's/%%/%/'
    fi
fi
"""
when = '[ "${STARSHIP_COCKPIT_BATTERY_ENABLED:-false}" = "true" ]'
format = "($output)"
disabled = false

[battery]
full_symbol = "َ°پ¹"
charging_symbol = "َ°‚„"
discharging_symbol = "َ°‚ƒ"
unknown_symbol = "َ°‚‘"
empty_symbol = "َ°‚ژ"
format = '([$symbol $percentage ]($style))'
disabled = false

[[battery.display]]
threshold = 10
style = "bold fg:color_danger"

[[battery.display]]
threshold = 20
style = "bold fg:color_caution"

[[battery.display]]
threshold = 100
style = "fg:color_other"

[time]
disabled = true
time_format = "%R"
style = "fg:color_time"
format = '[َ°”› $time ]($style)'

[cmd_duration]
min_time = 2000
format = '[َ±«‘ $duration ]($style)'
style = 'fg:color_duration'
show_milliseconds = false
disabled = true

[status]
disabled = false
format = '[($symbol $common_meaning$signal_name )]($style)'
map_symbol = true
pipestatus = true
symbol = 'َ°…™'
success_symbol = ''
not_executable_symbol = 'َ°‚­'
not_found_symbol = 'َ°چ‰'
sigint_symbol = 'َ°گٹ'
signal_symbol = 'َ±گ‹'
style = 'bold fg:color_danger'
recognize_signal_code = true

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[â‌¯](bold fg:color_ok)'
error_symbol = '[â‌¯](bold fg:color_danger)'
vimcmd_symbol = '[â‌®](bold fg:color_vimcmd_ok)'
vimcmd_replace_one_symbol = '[â‌®](bold fg:color_vimcmd_replace)'
vimcmd_replace_symbol = '[â‌®](bold fg:color_vimcmd_replace)'
vimcmd_visual_symbol = '[â‌®](bold fg:color_vimcmd_visual)'

[custom.keyboard_layout]
command = """
# Set env variables if you want to use layout aliases (in uppercase)
#     export STARSHIP_COCKPIT_KEYBOARD_LAYOUT_ABC=ENG
#     export STARSHIP_COCKPIT_KEYBOARD_LAYOUT_UKRAINIAN=UKR
# 
# Implementations:
#     macOS
if [ "$(uname -s)" = "Darwin" ]; then
        input_source=$(defaults read ~/Library/Preferences/com.apple.HIToolbox.plist AppleCurrentKeyboardLayoutInputSourceID)
        layout_id=$(echo "$input_source" | cut -d '.' -f4)
        layout=$(printenv "STARSHIP_COCKPIT_KEYBOARD_LAYOUT_$(echo "$layout_id" | tr '[:lower:]' '[:upper:]')")
        echo "$layout" || echo "$layout_id"
fi
"""
symbol = "َ°ŒŒ"
style = "fg:color_other"
format = '[($symbol $output )]($style)'
when = '[ "${STARSHIP_COCKPIT_KEYBOARD_LAYOUT_ENABLED:-false}" = "true" ]'
disabled = false

